<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Digital Clock - Display current time in multiple time zones worldwide">
    <meta name="keywords" content="digital clock, time zones, world clock, timezone converter">
    <meta name="author" content="Mustafa">
    <title>Digital Clock | Multiple Time Zones</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --accent-hover: #7dd3fc;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border-color: #334155;
            --success-color: #10b981;
            --error-color: #ef4444;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Courier New', 'Courier', monospace;
            background: linear-gradient(135deg, var(--bg-color) 0%, #0a0e1a 100%);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        /* Dark/Light Mode */
        body.light-mode {
            --bg-color: #ffffff;
            --card-bg: #f3f4f6;
            --accent-color: #0ea5e9;
            --text-main: #1f2937;
            --text-dim: #6b7280;
            --border-color: #e5e7eb;
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 0;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--accent-color);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.1rem;
            color: var(--text-dim);
        }

        /* Navigation/Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--accent-color);
            color: #000;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
        }

        .btn:hover,
        .btn:focus {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
            outline: none;
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
        }

        .btn-secondary:hover {
            background: var(--accent-color);
            color: #000;
        }

        .theme-toggle {
            background: none;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            background-color: var(--accent-color);
            color: #000;
        }

        /* Main Clock Display */
        .main-clock {
            background: linear-gradient(135deg, var(--card-bg), rgba(56, 189, 248, 0.1));
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .main-clock h2 {
            font-size: 1.5rem;
            color: var(--text-dim);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #mainDisplay {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
            letter-spacing: 3px;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }

        .date-display {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .timezone-info {
            font-size: 1rem;
            color: var(--accent-color);
            font-weight: 600;
        }

        /* Timezone Controls */
        .timezone-selector {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 40px;
        }

        .timezone-selector h3 {
            margin-bottom: 15px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timezone-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
        }

        .timezone-input {
            display: flex;
            gap: 10px;
        }

        select {
            flex: 1;
            padding: 12px;
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        select:hover,
        select:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        .add-btn {
            padding: 12px 20px;
            background: var(--success-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .add-btn:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        /* Clock Grid */
        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .clock-card {
            background: linear-gradient(135deg, var(--card-bg), rgba(56, 189, 248, 0.1));
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .clock-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(56, 189, 248, 0.3);
            border-color: var(--accent-color);
        }

        .clock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.2), transparent);
            transition: var(--transition);
        }

        .clock-card:hover::before {
            left: 100%;
        }

        .clock-timezone {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .clock-time {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: bold;
            color: var(--text-main);
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .clock-date {
            font-size: 0.95rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .clock-offset {
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: 600;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--error-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-btn:hover {
            background: #dc2626;
            transform: scale(1.1);
        }

        /* Digital Separator */
        .separator {
            display: inline-block;
            width: 4px;
            height: 1.2em;
            background: var(--accent-color);
            margin: 0 2px;
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49%, 100% {
                opacity: 1;
            }
            50%, 99% {
                opacity: 0.3;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-dim);
            font-size: 0.9rem;
            border-top: 1px solid var(--border-color);
            margin-top: 40px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .main-clock {
                padding: 30px 20px;
            }

            #mainDisplay {
                font-size: 2.5rem;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .timezone-grid {
                grid-template-columns: 1fr;
            }

            .timezone-input {
                flex-direction: column;
            }

            select,
            .add-btn {
                width: 100%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .clock-card {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <header>
        <h1>⏰ Digital Clock</h1>
        <p>Track time across multiple time zones worldwide</p>
    </header>

    <!-- Controls -->
    <div class="controls">
        <button class="btn" id="addPreset" aria-label="Add preset timezones">Add Presets</button>
        <button class="btn btn-secondary" id="clearAll" aria-label="Clear all timezones">Clear All</button>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle theme">🌙</button>
    </div>

    <!-- Main Clock -->
    <div class="main-clock">
        <h2>Current Time (Local)</h2>
        <div id="mainDisplay">00<span class="separator"></span>00<span class="separator"></span>00</div>
        <div class="date-display" id="mainDate"></div>
        <div class="timezone-info" id="mainTimezone"></div>
    </div>

    <!-- Timezone Selector -->
    <div class="timezone-selector">
        <h3>Add Custom Timezone</h3>
        <div class="timezone-grid">
            <div class="timezone-input">
                <select id="timezoneSelect" aria-label="Select timezone">
                    <option value="">Select a timezone...</option>
                </select>
                <button class="add-btn" id="addBtn" aria-label="Add selected timezone">Add</button>
            </div>
        </div>
    </div>

    <!-- Clocks Grid -->
    <div id="clocksContainer" class="clocks-grid"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state">
        <h3>No timezones added yet</h3>
        <p>Add a timezone from the selector above to get started</p>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Digital Clock. Real-time timezone converter. | Built with ❤️</p>
    </footer>
</div>

<script>
    // Timezone data
    const TIMEZONES = [
        { offset: -12, name: 'UTC-12:00', city: 'Baker Island' },
        { offset: -11, name: 'UTC-11:00', city: 'Samoa' },
        { offset: -10, name: 'UTC-10:00', city: 'Hawaii' },
        { offset: -9, name: 'UTC-09:00', city: 'Alaska' },
        { offset: -8, name: 'UTC-08:00', city: 'Pacific Time (US)' },
        { offset: -7, name: 'UTC-07:00', city: 'Mountain Time (US)' },
        { offset: -6, name: 'UTC-06:00', city: 'Central Time (US)' },
        { offset: -5, name: 'UTC-05:00', city: 'Eastern Time (US)' },
        { offset: -4, name: 'UTC-04:00', city: 'Atlantic Time' },
        { offset: -3.5, name: 'UTC-03:30', city: 'Newfoundland' },
        { offset: -3, name: 'UTC-03:00', city: 'Brasília' },
        { offset: -2, name: 'UTC-02:00', city: 'Mid-Atlantic' },
        { offset: -1, name: 'UTC-01:00', city: 'Azores' },
        { offset: 0, name: 'UTC±00:00', city: 'London (GMT)' },
        { offset: 1, name: 'UTC+01:00', city: 'Paris (CET)' },
        { offset: 2, name: 'UTC+02:00', city: 'Cairo (EET)' },
        { offset: 3, name: 'UTC+03:00', city: 'Moscow' },
        { offset: 4, name: 'UTC+04:00', city: 'Dubai' },
        { offset: 4.5, name: 'UTC+04:30', city: 'Afghanistan' },
        { offset: 5, name: 'UTC+05:00', city: 'Pakistan' },
        { offset: 5.5, name: 'UTC+05:30', city: 'India' },
        { offset: 5.75, name: 'UTC+05:45', city: 'Nepal' },
        { offset: 6, name: 'UTC+06:00', city: 'Bangladesh' },
        { offset: 6.5, name: 'UTC+06:30', city: 'Myanmar' },
        { offset: 7, name: 'UTC+07:00', city: 'Bangkok' },
        { offset: 8, name: 'UTC+08:00', city: 'Hong Kong' },
        { offset: 8.75, name: 'UTC+08:45', city: 'Australia (Western)' },
        { offset: 9, name: 'UTC+09:00', city: 'Tokyo' },
        { offset: 9.5, name: 'UTC+09:30', city: 'Australia (Central)' },
        { offset: 10, name: 'UTC+10:00', city: 'Sydney' },
        { offset: 10.5, name: 'UTC+10:30', city: 'Australia (Lord Howe)' },
        { offset: 11, name: 'UTC+11:00', city: 'Solomon Islands' },
        { offset: 12, name: 'UTC+12:00', city: 'New Zealand' },
        { offset: 12.75, name: 'UTC+12:45', city: 'Chatham Islands' },
        { offset: 13, name: 'UTC+13:00', city: 'Tonga' },
        { offset: 14, name: 'UTC+14:00', city: 'Line Islands' }
    ];

    // State
    let selectedTimezones = [];
    let isDarkMode = true;

    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('clockTheme') || 'dark';
    if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        isDarkMode = false;
        themeToggle.textContent = '☀️';
    }

    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        isDarkMode = !isDarkMode;
        themeToggle.textContent = isDarkMode ? '🌙' : '☀️';
        localStorage.setItem('clockTheme', isDarkMode ? 'dark' : 'light');
    });

    // Populate timezone select
    const timezoneSelect = document.getElementById('timezoneSelect');
    TIMEZONES.forEach(tz => {
        const option = document.createElement('option');
        option.value = tz.offset;
        option.textContent = `${tz.name} - ${tz.city}`;
        timezoneSelect.appendChild(option);
    });

    // Format time
    function formatTime(hours, minutes, seconds) {
        return `${String(hours).padStart(2, '0')}<span class="separator"></span>${String(minutes).padStart(2, '0')}<span class="separator"></span>${String(seconds).padStart(2, '0')}`;
    }

    // Get timezone name from offset
    function getTimezoneName(offset) {
        const tz = TIMEZONES.find(t => t.offset === offset);
        return tz ? `${tz.name} - ${tz.city}` : `UTC${offset >= 0 ? '+' : ''}${offset}`;
    }

    // Calculate time for offset
    function getTimeForOffset(offset) {
        const now = new Date();
        const utc = now.getTime() + now.getTimezoneOffset() * 60000;
        const tzTime = new Date(utc + 3600000 * offset);
        return {
            hours: tzTime.getHours(),
            minutes: tzTime.getMinutes(),
            seconds: tzTime.getSeconds(),
            date: tzTime.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })
        };
    }

    // Update main clock
    function updateMainClock() {
        const now = new Date();
        const time = getTimeForOffset(now.getTimezoneOffset() / -60);
        
        document.getElementById('mainDisplay').innerHTML = formatTime(time.hours, time.minutes, time.seconds);
        document.getElementById('mainDate').textContent = time.date;
        
        const localOffset = -(new Date().getTimezoneOffset() / 60);
        document.getElementById('mainTimezone').textContent = getTimezoneName(localOffset);
    }

    // Update all clocks
    function updateAllClocks() {
        updateMainClock();

        const container = document.getElementById('clocksContainer');
        const emptyState = document.getElementById('emptyState');

        if (selectedTimezones.length === 0) {
            container.innerHTML = '';
            emptyState.style.display = 'block';
            return;
        }

        emptyState.style.display = 'none';
        container.innerHTML = '';

        selectedTimezones.forEach((offset, index) => {
            const time = getTimeForOffset(offset);
            const timezoneName = getTimezoneName(offset);
            
            const clockCard = document.createElement('div');
            clockCard.className = 'clock-card';
            
            // Calculate offset display
            let offsetDisplay = `UTC${offset >= 0 ? '+' : ''}${offset}`;
            if (offset % 1 !== 0) {
                offsetDisplay = `UTC${offset >= 0 ? '+' : ''}${offset.toFixed(2)}`;
            }

            clockCard.innerHTML = `
                <button class="remove-btn" data-index="${index}" aria-label="Remove timezone">&times;</button>
                <div class="clock-timezone">${timezoneName.split(' - ')[1]}</div>
                <div class="clock-time">${formatTime(time.hours, time.minutes, time.seconds)}</div>
                <div class="clock-date">${time.date}</div>
                <div class="clock-offset">${offsetDisplay}</div>
            `;

            container.appendChild(clockCard);
        });

        // Add remove button listeners
        document.querySelectorAll('.remove-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const index = parseInt(btn.dataset.index);
                removeTimezone(index);
            });
        });
    }

    // Add timezone
    function addTimezone() {
        const value = timezoneSelect.value;
        if (value === '') return;

        const offset = parseFloat(value);
        if (!selectedTimezones.includes(offset)) {
            selectedTimezones.push(offset);
            selectedTimezones.sort((a, b) => a - b);
            localStorage.setItem('selectedTimezones', JSON.stringify(selectedTimezones));
            updateAllClocks();
            timezoneSelect.value = '';
        }
    }

    // Remove timezone
    function removeTimezone(index) {
        selectedTimezones.splice(index, 1);
        localStorage.setItem('selectedTimezones', JSON.stringify(selectedTimezones));
        updateAllClocks();
    }

    // Add presets
    function addPresets() {
        const presets = [0, -5, -8, 1, 8]; // GMT, EST, PST, CET, JST
        selectedTimezones = [...new Set([...selectedTimezones, ...presets])].sort((a, b) => a - b);
        localStorage.setItem('selectedTimezones', JSON.stringify(selectedTimezones));
        updateAllClocks();
    }

    // Clear all
    function clearAll() {
        selectedTimezones = [];
        localStorage.setItem('selectedTimezones', JSON.stringify(selectedTimezones));
        updateAllClocks();
    }

    // Event listeners
    document.getElementById('addBtn').addEventListener('click', addTimezone);
    timezoneSelect.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTimezone();
    });
    document.getElementById('addPreset').addEventListener('click', addPresets);
    document.getElementById('clearAll').addEventListener('click', clearAll);

    // Load saved timezones
    const saved = localStorage.getItem('selectedTimezones');
    if (saved) {
        selectedTimezones = JSON.parse(saved);
    }

    // Initial update
    updateAllClocks();

    // Update every second
    setInterval(updateAllClocks, 1000);

    console.log('Digital Clock loaded successfully!');
</script>

</body>
</html>
